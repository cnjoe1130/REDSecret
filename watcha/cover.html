<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>REDSecret Cover</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 630px;
    background: #1a1a2e;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'SF Pro Display', -apple-system, 'Helvetica Neue', sans-serif;
    overflow: hidden;
    position: relative;
  }
  
  /* Main layout */
  .container {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    height: 100%;
    padding: 0 80px;
  }
  
  /* Left: text */
  .left {
    flex: 0 0 480px;
    z-index: 2;
  }
  .brand-small {
    font-size: 16px;
    color: #ff4757;
    letter-spacing: 6px;
    text-transform: uppercase;
    font-weight: 600;
    margin-bottom: 20px;
  }
  .headline {
    font-size: 52px;
    font-weight: 700;
    color: #ffffff;
    line-height: 1.15;
    margin-bottom: 16px;
  }
  .headline .red {
    color: #ff4757;
  }
  .sub {
    font-size: 18px;
    color: rgba(255,255,255,0.45);
    line-height: 1.6;
    max-width: 420px;
  }
  .divider {
    width: 48px;
    height: 2px;
    background: #ff4757;
    margin: 24px 0;
    opacity: 0.6;
  }
  .tagline {
    font-size: 14px;
    color: rgba(255,255,255,0.3);
    letter-spacing: 3px;
    text-transform: uppercase;
  }
  
  /* Right: two-layer card concept */
  .right {
    flex: 0 0 520px;
    height: 420px;
    position: relative;
    z-index: 2;
  }
  
  .card {
    position: absolute;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  }
  
  /* Surface card (front) */
  .card-surface {
    width: 380px;
    height: 260px;
    background: #16213e;
    border: 1px solid rgba(255,255,255,0.08);
    top: 0;
    left: 0;
    z-index: 3;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 32px;
  }
  .card-surface .card-label {
    font-size: 11px;
    color: rgba(255,255,255,0.3);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .card-surface .card-title {
    font-size: 22px;
    font-weight: 600;
    color: #ffffff;
    margin-bottom: 4px;
  }
  .card-surface .card-desc {
    font-size: 13px;
    color: rgba(255,255,255,0.35);
    line-height: 1.5;
  }
  .card-surface .fake-chart {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    height: 80px;
    margin-top: auto;
  }
  .card-surface .fake-chart .bar {
    flex: 1;
    background: rgba(255,71,87,0.2);
    border-radius: 3px 3px 0 0;
  }
  .card-surface .fake-chart .bar.highlight {
    background: rgba(255,71,87,0.6);
  }
  
  /* Hidden card (back, partially visible) */
  .card-hidden {
    width: 380px;
    height: 260px;
    background: #0f3460;
    border: 1px solid rgba(255,71,87,0.2);
    top: 100px;
    left: 100px;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .card-hidden .hidden-icon {
    width: 48px;
    height: 48px;
    border: 2px solid rgba(255,71,87,0.4);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 16px;
  }
  .card-hidden .hidden-icon svg {
    width: 24px;
    height: 24px;
  }
  .card-hidden .hidden-text {
    font-size: 15px;
    color: rgba(255,71,87,0.7);
    letter-spacing: 2px;
  }
  .card-hidden .hidden-sub {
    font-size: 12px;
    color: rgba(255,255,255,0.2);
    margin-top: 6px;
  }
  
  /* Connector line */
  .connector {
    position: absolute;
    top: 130px;
    left: 40px;
    width: 80px;
    height: 1px;
    background: linear-gradient(90deg, rgba(255,71,87,0.5), rgba(255,71,87,0.1));
    z-index: 4;
  }
  .connector::after {
    content: '';
    position: absolute;
    right: 0;
    top: -3px;
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #ff4757;
    opacity: 0.6;
  }
  
  /* Background decoration */
  .bg-circle {
    position: absolute;
    border-radius: 50%;
    border: 1px solid rgba(255,71,87,0.06);
  }
  .bg-circle.c1 {
    width: 400px;
    height: 400px;
    right: 100px;
    top: -80px;
  }
  .bg-circle.c2 {
    width: 300px;
    height: 300px;
    right: 160px;
    bottom: -60px;
  }
</style>
</head>
<body>
  <div class="bg-circle c1"></div>
  <div class="bg-circle c2"></div>
  
  <div class="container">
    <div class="left">
      <div class="brand-small">REDSecret</div>
      <div class="headline">
        表面是数据<br>
        暗层是<span class="red">真心话</span>
      </div>
      <div class="divider"></div>
      <div class="sub">
        基于 DCT 频域隐写技术，将秘密信息隐藏在图片的频率系数中。<br>
        只有知道密钥的人，才能看见暗层的真相。
      </div>
      <div class="tagline" style="margin-top:28px;">Hidden in Plain Sight</div>
    </div>
    
    <div class="right">
      <!-- Surface layer card -->
      <div class="card card-surface">
        <div>
          <div class="card-label">表层 Surface Layer</div>
          <div class="card-title">股票分析日报</div>
          <div class="card-desc">今日大盘指数分析及行业板块走势研判...</div>
        </div>
        <div class="fake-chart">
          <div class="bar" style="height:40%"></div>
          <div class="bar" style="height:65%"></div>
          <div class="bar highlight" style="height:85%"></div>
          <div class="bar" style="height:50%"></div>
          <div class="bar" style="height:70%"></div>
          <div class="bar" style="height:55%"></div>
          <div class="bar" style="height:45%"></div>
        </div>
      </div>
      
      <div class="connector"></div>
      
      <!-- Hidden layer card -->
      <div class="card card-hidden">
        <div class="hidden-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="#ff4757" stroke-width="1.5" opacity="0.6">
            <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </div>
        <div class="hidden-text">暗层 Hidden Layer</div>
        <div class="hidden-sub">只有接收者才能解码的秘密信息</div>
      </div>
    </div>
  </div>
</body>
</html>
