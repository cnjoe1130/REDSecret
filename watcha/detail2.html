<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>REDSecret Detail 2 - 消息揭示</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 630px;
    background: #1a1a2e;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'SF Pro Display', -apple-system, 'Helvetica Neue', sans-serif;
    overflow: hidden;
    position: relative;
  }
  
  .page-title {
    font-size: 14px;
    color: rgba(255,255,255,0.25);
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 32px;
    text-align: center;
  }
  
  .reveal-row {
    display: flex;
    gap: 48px;
    align-items: center;
  }
  
  /* Left: the encoded image */
  .image-section {
    width: 400px;
    height: 400px;
    position: relative;
  }
  .image-frame {
    width: 100%;
    height: 100%;
    background: #16213e;
    border-radius: 14px;
    border: 1px solid rgba(255,255,255,0.06);
    box-shadow: 0 16px 48px rgba(0,0,0,0.3);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .image-frame .frame-header {
    padding: 20px 24px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .image-frame .frame-header .dots {
    display: flex;
    gap: 6px;
  }
  .image-frame .frame-header .dots span {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: rgba(255,255,255,0.08);
  }
  .image-frame .frame-body {
    flex: 1;
    padding: 24px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
  }
  
  /* Visual representation of frequency domain */
  .freq-grid {
    width: 280px;
    height: 200px;
    display: grid;
    grid-template-columns: repeat(14, 1fr);
    grid-template-rows: repeat(10, 1fr);
    gap: 2px;
    margin-bottom: 20px;
  }
  .freq-cell {
    border-radius: 2px;
    background: rgba(255,255,255,0.03);
  }
  .freq-cell.active {
    background: rgba(255,71,87,0.3);
  }
  .freq-cell.hidden-msg {
    background: #ff4757;
    opacity: 0.7;
  }
  .freq-label {
    font-size: 11px;
    color: rgba(255,255,255,0.2);
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  
  /* Key indicator */
  .key-badge {
    position: absolute;
    bottom: -12px;
    left: 50%;
    transform: translateX(-50%);
    background: #ff4757;
    color: #ffffff;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    padding: 6px 16px;
    border-radius: 20px;
    white-space: nowrap;
    z-index: 2;
  }
  
  /* Right: the revealed message */
  .reveal-section {
    width: 480px;
  }
  .reveal-label {
    font-size: 11px;
    color: rgba(255,71,87,0.6);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 16px;
  }
  .reveal-title {
    font-size: 32px;
    font-weight: 700;
    color: #ffffff;
    margin-bottom: 8px;
  }
  .reveal-subtitle {
    font-size: 14px;
    color: rgba(255,255,255,0.3);
    margin-bottom: 28px;
  }
  
  /* The secret message card */
  .secret-message {
    background: rgba(255,71,87,0.06);
    border: 1px solid rgba(255,71,87,0.15);
    border-radius: 12px;
    padding: 28px 32px;
    position: relative;
  }
  .secret-message .msg-prefix {
    font-size: 10px;
    color: rgba(255,71,87,0.5);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .secret-message .msg-text {
    font-size: 20px;
    font-weight: 500;
    color: #ff4757;
    line-height: 1.6;
    margin-bottom: 16px;
  }
  .secret-message .msg-meta {
    font-size: 12px;
    color: rgba(255,255,255,0.2);
    display: flex;
    gap: 16px;
  }
  .secret-message .msg-meta span {
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .secret-message .msg-meta .dot {
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: rgba(255,71,87,0.4);
  }
  
  /* Decorative: red line */
  .accent-line {
    position: absolute;
    top: 0;
    left: 0;
    width: 3px;
    height: 100%;
    background: #ff4757;
    border-radius: 3px 0 0 3px;
    opacity: 0.6;
  }
  
  /* Steps */
  .steps {
    margin-top: 24px;
    display: flex;
    gap: 12px;
  }
  .step {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: rgba(255,255,255,0.25);
  }
  .step .step-num {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    border: 1px solid rgba(255,71,87,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    color: rgba(255,71,87,0.6);
    font-weight: 600;
  }
  .step-connector {
    color: rgba(255,255,255,0.1);
    font-size: 10px;
  }
</style>
</head>
