<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:200px;height:200px;overflow:hidden}
body{background:#1a1a2e;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'SF Pro Display','PingFang SC','Noto Sans SC',system-ui,sans-serif}
.icon{font-size:44px;margin-bottom:6px;line-height:1}
.row{display:flex;align-items:baseline;gap:0}
.red{font-size:40px;font-weight:800;color:#ff4757;letter-spacing:-1px}
.white{font-size:40px;font-weight:300;color:#fff;letter-spacing:-1px}
.sub{font-size:10px;color:#777;margin-top:6px;letter-spacing:3px;font-weight:400}
</style>
</head>
<body>
<div class="icon">👁️‍🗨️</div>
<div class="row">
  <span class="red">RED</span><span class="white">Secret</span>
</div>
<div class="sub">HIDDEN IN PLAIN SIGHT</div>
</body>
</html>
